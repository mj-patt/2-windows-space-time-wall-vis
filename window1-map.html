<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Window 1 – Map</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000000; font-family: sans-serif;overflow:hidden }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 0;
    }

    h1 {
      color: #c8d8f0;
      font-size: 13px;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      flex-shrink: 0;
    }


    #win1-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }

    #win1 { width: 100%; height: 100%; }

    
    .vega-embed .vega-actions { display: none; }
  </style>
</head>
<body data-window="map">
  <div id="app">
   
    <div id="win1-wrap"><div id="win1"></div></div>
   
  </div>
  <script src="great-wall.js"></script>
</body>
</html>

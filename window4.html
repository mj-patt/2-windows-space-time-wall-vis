<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Window 4 – Choropleth</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #ffffff; font-family: sans-serif; overflow: hidden; }

    #app {
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100vw;
    }

    #left-col {
      flex: 0 0 85%;
      width: 85%;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #slider-wrap {
      flex-shrink: 0;
      padding: 14px 24px 8px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #year-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 20px;
      background: transparent;
      cursor: pointer;
    }

    #year-slider::-webkit-slider-runnable-track {
      height: 10px;
      background: #8a8a8a;
      border-radius: 999px;
    }

    #year-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: #e6e6e6;
      border: 1px solid #bdbdbd;
      margin-top: -15px;
    }

    .slider-label {
      font-size: 32px;
      color: #999;
      letter-spacing: 0.05em;
      min-width: 40px;
      text-align: center;
    }

    #map-wrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    #win3 {
      width: 100%;
      height: 100%;
    }

    #right-panel {
      flex: 0 0 15%;
      width: 15%;
      height: 100%;
      background: #ffffff;
      border-left: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 36px 28px 40px 28px;
    }

    #panel-title {
      color: #111;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.35;
      opacity: 0.85;
    }

    #panel-title .dot-sep {
      display: block;
      font-weight: normal;
      font-size: 16px;
      letter-spacing: 0.12em;
      color: #888;
      margin-top: 6px;
    }

    /* big year in the middle */
    #panel-year-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    #panel-year-label {
        margin-top:75%;
      font-size: 16px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
    }

    #panel-year {
      font-size: 56px;
      font-weight: bold;
      letter-spacing: -0.02em;
      color: #111;
      line-height: 1;
    }

    /* legend */
    #panel-legend {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1 1 auto;
      min-height: 0;
      justify-content: flex-end;
    }

    #legend-title {
      font-size: 16px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
    }

    #legend-body {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 10px;
    }

    #legend-gradient {
      width: 36px;
      flex-shrink: 0;
      border-radius: 4px;
      min-height: 560px;
      background: linear-gradient(to bottom,
        #67000d,
        #a50f15,
        #cb181d,
        #ef3b2c,
        #fb6a4a,
        #fc9272,
        #fcbba1,
        #fee0d2,
        #fff5f0
      );
    }

    #legend-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 16px;
      color: #666;
      letter-spacing: 0.04em;
    }

    #legend-no-data {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      color: #666;
    }

    #legend-no-data-swatch {
      width: 36px;
      height: 34px;
      border-radius: 2px;
      background: #b0bec5;
      flex-shrink: 0;
    }

    .vega-embed .vega-actions { display: none; }
  </style>
</head>
<body data-window="choropleth-small">
  <div id="app">

    <!-- LEFT: slider + map -->
    <div id="left-col">
      <div id="slider-wrap">
        <span class="slider-label">1994</span>
        <input id="year-slider" type="range" min="1994" max="2024" step="1" value="1994" />
        <span class="slider-label">2024</span>
      </div>
      <div id="map-wrap"><div id="win3"></div></div>
    </div>

    <!-- RIGHT: info panel -->
    <div id="right-panel">

      <div id="panel-title">
        EU Unemployment Rate
        <span class="dot-sep">Choropleth Map</span>
      </div>

      <div id="panel-year-wrap">
        <span id="panel-year-label">Selected Year</span>
        <span id="panel-year">1994</span>
      </div>

      <div id="panel-legend">
        <div id="legend-title">Unemployment Rate</div>
        <div id="legend-body">
          <div id="legend-gradient"></div>
          <div id="legend-labels">
            <span>30%</span>
            <span>20%</span>
            <span>10%</span>
            <span>0%</span>
          </div>
        </div>
        <div id="legend-no-data">
          <div id="legend-no-data-swatch"></div>
          <span>No data</span>
        </div>
      </div>

    </div>
  </div>

  <script src="great-wall.js"></script>
</body>
</html>

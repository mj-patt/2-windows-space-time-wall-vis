<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Window 3 – Choropleth</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #ffffff; font-family: sans-serif; overflow: hidden;}

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header {
      flex-shrink: 0;
      padding: 18px 24px 0 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      height: 3%;
    }

    h1 {
      color: #000000;
      /* font-size: 13px; */
      font-size: 25px;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    #year-display {
      font-size: 27px;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #333;
      min-width: 50px;
    }

    #slider-wrap {
      flex-shrink: 0;
      padding: 20px 24px 6px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #year-slider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  /* height: 10px; */
  height: 18px;
  background: transparent;
  cursor: pointer;
}

/* track */
#year-slider::-webkit-slider-runnable-track {
  /* height: 3px; */
  height: 8px;
  background: #8a8a8a;
  border-radius: 999px;
}

/* thumb */
#year-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  /* width: 18px;
  height: 18px; */
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #e6e6e6;
  border: 1px solid #bdbdbd;
  /* margin-top: -7.5px; */
  margin-top: -11px;
}

    .slider-label {
      /* font-size: 11px; */
      font-size: 25px;
      color: #999;
      letter-spacing: 0.05em;
      min-width: 32px;
    }

    #map-wrap {
  flex: 1 1 auto;
  min-height: 0;
  width: 100%;
  position: relative;
  overflow: hidden;
}

#win3 { 
  width: 100%; 
  /* height: 100%;  */
}

    .vega-embed .vega-actions { display: none; }
  </style>
</head>
<body data-window="choropleth">
  <div id="app">
    <div id="header">
      <h1>EU Unemployment Rate &nbsp;·&nbsp; Choropleth</h1>
      <span id="year-display">1994</span>
    </div>
    <div id="slider-wrap">
      <span class="slider-label">1994</span>
      <input id="year-slider" type="range" min="1994" max="2024" step="1" value="1994" />
      <span class="slider-label">2024</span>
    </div>
    <div id="map-wrap"><div id="win3"></div></div>
  </div>
  <script src="great-wall.js"></script>
</body>
</html>
